<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Image Wall</title>
    <style>
        :root {
            --cell-width: {{ cell_width }}px;
            --cell-height: {{ cell_height }}px;
            color-scheme: light dark;
            font-family: Georgia, 'Times New Roman', serif;
            background: #111;
        }
        * { box-sizing: border-box; }
        html, body {
            width: 100%;
            min-height: 100%;
            margin: 0;
            background: #111;
        }
        body { overflow-x: hidden; }
        .wall {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(var(--cell-width), 1fr));
            grid-auto-rows: var(--cell-height);
            gap: 0;
            width: 100vw;
            min-height: 100vh;
            align-content: start;
            background: #111;
        }
        .tile {
            display: block;
            width: 100%;
            height: 100%;
            padding: 0;
            border: 0;
            background: #111;
            cursor: zoom-in;
            overflow: hidden;
        }
        .tile.double-wide {
            grid-column: span 2;
        }
        .tile img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
        }
        .lightbox {
            position: fixed;
            inset: 0;
            z-index: 10;
            display: none;
            place-items: center;
            padding: 1vmin;
            border: 0;
            background: rgb(0 0 0 / 92%);
            cursor: zoom-out;
        }
        .lightbox.is-open { display: grid; }
        .lightbox img {
            display: block;
            max-width: 100vw;
            max-height: calc(100vh - 2vmin);
            object-fit: contain;
            box-shadow: 0 1rem 4rem rgb(0 0 0 / 55%);
        }
    </style>
</head>
<body>
    <main class="wall" aria-label="Image wall">
        {% for item in items %}
            <button class="tile{% if item.is_double_wide %} double-wide{% endif %}" type="button">
                <img src="{{ item.src }}" alt="{{ item.alt }}" title="{{ item.title }}" loading="lazy">
            </button>
        {% endfor %}
    </main>
    <button class="lightbox" type="button" aria-label="Close full-size image">
        <img alt="">
    </button>
    <script>
        const lightbox = document.querySelector('.lightbox');
        const lightboxImage = lightbox.querySelector('img');

        document.querySelectorAll('.tile img').forEach((image) => {
            image.addEventListener('click', () => {
                lightboxImage.src = image.currentSrc || image.src;
                lightboxImage.alt = image.alt;
                lightbox.classList.add('is-open');
            });
        });

        lightbox.addEventListener('click', () => {
            lightbox.classList.remove('is-open');
            lightboxImage.removeAttribute('src');
        });
    </script>
</body>
</html>
